name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to VPS (Password Auth)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          sshpass -p "${VPS_PASSWORD}" ssh -o StrictHostKeyChecking=no -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} << 'ENDSSH'
            # 使用正确的目录（小写）
            cd /var/www/app-home-portal
            
            # 复制新应用文件
            echo "📦 部署 Dino Adventure..."
            if [ -d "/var/www/app-Home-Portal/public/dino-adventure" ]; then
              cp -r /var/www/app-Home-Portal/public/dino-adventure ./dino-adventure/
              echo "✅ Dino Adventure 文件已复制"
            else
              echo "⚠️ dino-adventure 源目录不存在"
            fi
            
            # 测试并重新加载 Nginx
            echo "🔧 测试 Nginx 配置..."
            nginx -t && systemctl reload nginx
            
            echo "✅ Deployed at: $(date)"
          ENDSSH

      - name: Verify deployment
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          sshpass -p "${VPS_PASSWORD}" ssh -o StrictHostKeyChecking=no -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} << 'ENDSSH'
            echo "✅ 部署验证:"
            
            echo "1. 检查 Dino Adventure 文件:"
            ls -la /var/www/app-home-portal/dino-adventure/
            
            echo ""
            echo "2. 测试登录验证（无 cookie 应该 302 重定向）:"
            curl -sI http://localhost/dino-adventure/ | head -3
            
            echo ""
            echo "3. Nginx 配置测试:"
            nginx -t
          ENDSSH

      - name: Notify completion
        run: echo "🎉 部署完成！"
