events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Performance settings
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name _;

        # Set root directory for static files
        root /usr/share/nginx/html/public;
        index index.html;

        # Portal Auth Check - Check for cookie on all requests
        location ~ ^/(minesweeper|app2|app3) {
            # Check for portal_auth cookie
            error_page 418 = @login_redirect;
            if ($cookie_portal_auth = "") {
                return 418;
            }

            # Proxy to sub-apps
            if ($request_uri ~ ^/minesweeper(.*)$) {
                proxy_pass http://localhost:8081;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                rewrite ^/minesweeper(.*)$ $1 break;
            }

            # Future apps
            # if ($request_uri ~ ^/app2(.*)$) {
            #     proxy_pass http://localhost:8082;
            #     rewrite ^/app2(.*)$ $1 break;
            # }
        }

        location @login_redirect {
            return 302 /login.html;
        }

        # Portal main page - auth check
        location = / {
            error_page 418 = @login_redirect;
            if ($cookie_portal_auth = "") {
                return 418;
            }
            try_files $uri /index.html;
        }

        # Login page - no auth required
        location = /login.html {
            try_files $uri =404;
        }

        # Static CSS and JS - no auth required (for login page)
        location ~ ^/(css|js)/ {
            try_files $uri =404;
        }

        # App config - no auth required
        location = /config/apps.json {
            root /usr/share/nginx/html;
            try_files $uri =404;
        }

        # Handle 404
        error_page 404 /index.html;
    }
}