<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Kanban</title>
    <style>
      body {
        font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial;
        margin: 0;
        background: #0b1220;
        color: #e5e7eb;
        overflow-x: auto;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }
      .card {
        background: rgba(255,255,255,.06);
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 16px;
        padding: 16px;
      }
      a { color: #93c5fd; }
      code { background: rgba(0,0,0,.25); padding: 2px 6px; border-radius: 8px; }
      .row { display: flex; gap: 12px; flex-wrap: wrap; }
      button {
        background: #3b82f6;
        border: none;
        color: white;
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
      }
      button.secondary { background: transparent; border: 1px solid rgba(255,255,255,.18); }
      button:hover { opacity: 0.9; }
      textarea {
        width: 100%;
        min-height: 220px;
        background: rgba(0,0,0,.25);
        color: #e5e7eb;
        border: 1px solid rgba(255,255,255,.15);
        border-radius: 12px;
        padding: 12px;
        resize: vertical;
      }

      /* Kanban Board Styles */
      .kanban-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .kanban-title {
        margin: 0;
        font-size: 1.8rem;
        font-weight: bold;
        background: linear-gradient(90deg, #60a5fa, #3b82f6, #3b82f6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .kanban-actions {
        display: flex;
        gap: 10px;
      }

      .kanban-board {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        padding: 10px 0;
      }

      .column {
        min-width: 300px;
        width: 100%;
        background: rgba(30, 41, 59, 0.5);
        border-radius: 12px;
        padding: 12px;
        display: flex;
        flex-direction: column;
      }

      .column-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 12px;
        margin-bottom: 12px;
        border-bottom: 1px solid rgba(255,255,255,.15);
        font-weight: bold;
        color: #93c5fd;
      }

      .task-count {
        background: rgba(59, 130, 246, 0.3);
        border-radius: 10px;
        padding: 2px 8px;
        font-size: 0.85em;
      }

      .tasks-container {
        flex: 1;
        min-height: 200px;
      }

      .task-card {
        background: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,.1);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        cursor: grab;
      }

      .task-card:active {
        cursor: grabbing;
      }

      .task-card.dragging {
        opacity: 0.6;
        transform: rotate(5deg);
        box-shadow: 0 10px 20px rgba(0,0,0,.3);
      }

      .task-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0,0,0,.2);
        background: rgba(255,255,255,.12);
      }

      .task-title {
        font-weight: bold;
        margin: 0 0 8px 0;
        color: #fff;
        font-size: 1.1em;
      }

      .task-description {
        color: #cbd5e1;
        margin: 0 0 8px 0;
        font-size: 0.9em;
        line-height: 1.4;
      }

      .task-meta {
        display: flex;
        justify-content: space-between;
        font-size: 0.8em;
        color: #94a3b8;
        border-top: 1px solid rgba(255,255,255,.1);
        padding-top: 8px;
        margin-top: 8px;
      }

      .task-agent {
        color: #60a5fa;
      }

      .task-updated {
        color: #94a3b8;
      }

      .add-task-btn {
        width: 100%;
        padding: 10px;
        background: rgba(59, 130, 246, 0.2);
        border: 1px dashed rgba(59, 130, 246, 0.5);
        color: #93c5fd;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 8px;
        font-size: 0.9em;
      }

      .add-task-btn:hover {
        background: rgba(59, 130, 246, 0.3);
      }

      .drop-indicator {
        border: 2px dashed #3b82f6;
        background: rgba(59, 130, 246, 0.1);
        border-radius: 8px;
        height: 60px;
        margin-bottom: 10px;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal-content {
        background: #1e293b;
        border: 1px solid rgba(255,255,255,.2);
        border-radius: 12px;
        padding: 24px;
        width: 90%;
        max-width: 500px;
        max-height: 90vh;
        overflow-y: auto;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }

      .modal-title {
        margin: 0;
        font-size: 1.4em;
        color: #fff;
      }

      .close-modal {
        background: none;
        border: none;
        color: #fff;
        font-size: 1.5em;
        cursor: pointer;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-label {
        display: block;
        margin-bottom: 6px;
        color: #cbd5e1;
      }

      .form-input {
        width: 100%;
        padding: 10px;
        background: rgba(0,0,0,.25);
        color: #e5e7eb;
        border: 1px solid rgba(255,255,255,.15);
        border-radius: 8px;
        font-size: 1em;
      }

      .form-textarea {
        width: 100%;
        min-height: 100px;
        padding: 10px;
        background: rgba(0,0,0,.25);
        color: #e5e7eb;
        border: 1px solid rgba(255,255,255,.15);
        border-radius: 8px;
        font-size: 1em;
        resize: vertical;
      }

      .modal-buttons {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 16px;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 768px) {
        .kanban-board {
          flex-direction: column;
        }

        .column {
          min-width: 100%;
        }
      }
    </style>
    <script type="module" crossorigin src="/tasks/assets/index-BcIVst3e.js"></script>
  </head>
  <body>
    <div class="wrap">
      <!-- Kanban Board -->
      <div class="kanban-header">
        <h1 class="kanban-title">🗂️ Team Kanban</h1>
        <div class="kanban-actions">
          <button id="refresh-btn" class="secondary">🔄 刷新</button>
          <button id="add-task-btn" class="primary">➕ 新建任务</button>
        </div>
      </div>

      <div class="kanban-board">
        <div class="column" data-status="todo">
          <div class="column-header">
            <span>📋 To Do</span>
            <span class="task-count" id="todo-count">0</span>
          </div>
          <div class="tasks-container" id="todo-tasks"></div>
          <button class="add-task-btn" data-status="todo">➕ 添加任务</button>
        </div>

        <div class="column" data-status="doing">
          <div class="column-header">
            <span>💪 Doing</span>
            <span class="task-count" id="doing-count">0</span>
          </div>
          <div class="tasks-container" id="doing-tasks"></div>
          <button class="add-task-btn" data-status="doing">➕ 添加任务</button>
        </div>

        <div class="column" data-status="done">
          <div class="column-header">
            <span>✅ Done</span>
            <span class="task-count" id="done-count">0</span>
          </div>
          <div class="tasks-container" id="done-tasks"></div>
          <button class="add-task-btn" data-status="done">➕ 添加任务</button>
        </div>
      </div>
    </div>

    <!-- Task Modal -->
    <div class="modal" id="task-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title">创建新任务</h2>
          <button class="close-modal">&times;</button>
        </div>
        <form id="task-form">
          <input type="hidden" id="task-id">
          <div class="form-group">
            <label class="form-label" for="task-title">标题 *</label>
            <input type="text" id="task-title" class="form-input" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="task-description">描述</label>
            <textarea id="task-description" class="form-textarea"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label" for="task-agent">负责人</label>
            <input type="text" id="task-agent" class="form-input">
          </div>
          <div class="form-group">
            <label class="form-label" for="task-status">状态</label>
            <select id="task-status" class="form-input">
              <option value="todo">📋 To Do</option>
              <option value="doing">💪 Doing</option>
              <option value="done">✅ Done</option>
            </select>
          </div>
          <div class="modal-buttons">
            <button type="button" class="secondary close-modal">取消</button>
            <button type="submit" id="save-task-btn">保存</button>
          </div>
        </form>
      </div>
    </div>

  </body>
</html>
