name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Upload public/ to VPS (Password Auth)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          set -e
          echo "📦 Upload public/ → /var/www/app-home-portal"

          # Ensure target dir exists
          sshpass -p "${VPS_PASSWORD}" ssh -o StrictHostKeyChecking=no -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} "mkdir -p /var/www/app-home-portal"

          # Copy static assets from runner → VPS (no VPS outbound access to GitHub needed)
          sshpass -p "${VPS_PASSWORD}" rsync -az --delete -e "ssh -o StrictHostKeyChecking=no -p ${VPS_PORT}" \
            ./public/ ${VPS_USER}@${VPS_HOST}:/var/www/app-home-portal/

          echo "📦 Upload nginx config"
          sshpass -p "${VPS_PASSWORD}" scp -o StrictHostKeyChecking=no -P ${VPS_PORT} \
            ./deploy/nginx/app-home-portal.conf ${VPS_USER}@${VPS_HOST}:/tmp/app-home-portal.conf

      - name: Apply nginx config on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          sshpass -p "${VPS_PASSWORD}" ssh -o StrictHostKeyChecking=no -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} << 'ENDSSH'
            set -e
            echo "🔧 Apply nginx config..."
            CONF_DST="/etc/nginx/sites-available/app-home-portal"
            mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
            cp /tmp/app-home-portal.conf "$CONF_DST"
            ln -sf "$CONF_DST" /etc/nginx/sites-enabled/app-home-portal
            rm -f /etc/nginx/sites-enabled/default || true

            echo "🔧 Test & reload nginx..."
            nginx -t
            systemctl reload nginx

            echo "✅ Deployed at: $(date)"
          ENDSSH

      - name: Verify deployment
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          sshpass -p "${VPS_PASSWORD}" ssh -o StrictHostKeyChecking=no -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} << 'ENDSSH'
            set -e
            echo "✅ 部署验证:"

            echo "1) /tasks/ (无 cookie 应该 302 到 /login.html)"
            curl -sI http://localhost/tasks/ | head -n 8

            echo ""
            echo "2) / (200 返回 portal index.html)"
            curl -sI http://localhost/ | head -n 8

            echo ""
            echo "3) Nginx 配置测试:"
            nginx -t
          ENDSSH

      - name: Notify completion
        run: echo "🎉 部署完成！"
