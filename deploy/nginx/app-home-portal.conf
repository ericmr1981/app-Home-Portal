map $cookie_portal_auth $has_portal_auth {
  default 1;
  "" 0;
}

server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /var/www/app-home-portal;
  index index.html;

  # Portal static
  location = / {
    try_files /index.html =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Ensure /kids redirects to /kids/
  location = /kids {
    return 301 /kids/;
  }

  # Kids assets (force no-store to recover from bad cache)
  location ^~ /kids/assets/ {
    if ($has_portal_auth = 0) { return 302 /login.html; }
    add_header Cache-Control 'no-store' always;
    proxy_pass http://127.0.0.1:8083/assets/;
    proxy_set_header Host $host;
  }

  # Gate kids app by portal cookie
  location ^~ /kids/ {
    if ($has_portal_auth = 0) {
      return 302 /login.html;
    }
    add_header Cache-Control 'no-store' always;
    # Strip /kids prefix when proxying so built assets at /kids/assets map to upstream /assets
    proxy_pass http://127.0.0.1:8083/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Proxy AI API paths to kids server (kids server handles upstream proxy)
  location ^~ /api/anthropic/ {
    if ($has_portal_auth = 0) { return 302 /login.html; }
    proxy_pass http://127.0.0.1:8083;
    proxy_set_header Host $host;
  }
  location ^~ /api/ark/ {
    if ($has_portal_auth = 0) { return 302 /login.html; }
    proxy_pass http://127.0.0.1:8083;
    proxy_set_header Host $host;
  }


  # Assets for kids app (Vite build uses /assets/* absolute paths)
  location ^~ /assets/ {
    if ($has_portal_auth = 0) { return 302 /login.html; }
    proxy_pass http://127.0.0.1:8083;
    proxy_set_header Host $host;
  }

  location = /vite.svg {
    if ($has_portal_auth = 0) { return 302 /login.html; }
    proxy_pass http://127.0.0.1:8083;
    proxy_set_header Host $host;
  }
}
