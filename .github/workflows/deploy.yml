name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Deploy to VPS (Password Auth)
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          sshpass -p "${VPS_PASSWORD}" ssh -o StrictHostKeyChecking=no -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} << 'ENDSSH'
            set -e

            echo "📦 Update source repo on VPS: /var/www/app-Home-Portal"

            if [ -d "/var/www/app-Home-Portal/.git" ]; then
              cd /var/www/app-Home-Portal
              git pull origin main
            else
              echo "⚠️ /var/www/app-Home-Portal is not a git repo; skipping git pull"
            fi

            echo "📦 Deploy Portal public/ → /var/www/app-home-portal"

            # 1) Sync static assets (everything under public/)
            mkdir -p /var/www/app-home-portal
            rsync -a --delete /var/www/app-Home-Portal/public/ /var/www/app-home-portal/

            # 2) Apply nginx config
            echo "🔧 Apply nginx config..."
            CONF_SRC="/var/www/app-Home-Portal/deploy/nginx/app-home-portal.conf"
            CONF_DST="/etc/nginx/sites-available/app-home-portal"
            mkdir -p /etc/nginx/sites-available /etc/nginx/sites-enabled
            cp "$CONF_SRC" "$CONF_DST"
            ln -sf "$CONF_DST" /etc/nginx/sites-enabled/app-home-portal
            rm -f /etc/nginx/sites-enabled/default || true

            echo "🔧 Test & reload nginx..."
            nginx -t
            systemctl reload nginx

            echo "✅ Deployed at: $(date)"
          ENDSSH

      - name: Verify deployment
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USERNAME }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
        run: |
          sshpass -p "${VPS_PASSWORD}" ssh -o StrictHostKeyChecking=no -p ${VPS_PORT} ${VPS_USER}@${VPS_HOST} << 'ENDSSH'
            set -e
            echo "✅ 部署验证:"

            echo "1) /tasks/ (无 cookie 应该 302 到 /login.html)"
            curl -sI http://localhost/tasks/ | head -n 5

            echo ""
            echo "2) / (无 cookie 应该 200 返回 portal index.html)"
            curl -sI http://localhost/ | head -n 5

            echo ""
            echo "3) Nginx 配置测试:"
            nginx -t
          ENDSSH

      - name: Notify completion
        run: echo "🎉 部署完成！"
